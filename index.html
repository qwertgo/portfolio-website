<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Samuel Galonska</title>
    <link rel="stylesheet" href="MainPageStyle.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,400;0,500;0,700;1,500&display=swap" rel="stylesheet">

    <link rel="portfolio-favicon" sizes="180x180" href="ref/Favicon/Favicon_Big.webp">
    <link rel="icon" type="image/png" sizes="32x32" href="ref/Favicon/Favicon_Medium.webp">
    <link rel="icon" type="image/png" sizes="16x16" href="ref/Favicon/Favicon_Small.webp">
</head>

<body>
    <header>
        <h1>Samuel Galonska</h1>
        <h2>Programming & Technical Art</h2>
    </header>
    <div class="background-gradient"></div>
    <div class="background-upper"></div>
    <div class="card-selection">
        <button class="arrow left">
            <img src="ref/ArrowLeft.svg" alt="Arrow Left">
        </button>
        <button class="arrow right">
            <img src="ref/ArrowRight.svg" alt="Arrow Right">
        </button>

        <div class="card-track">
            <div class="card" id="Seashaken">
                <img src="ref/Cards/Seashaken_300.webp"
                srcset="ref/Cards/Seashaken_150.webp 150w, 
                    ref/Cards/Seashaken_225.webp 225w,
                    ref/Cards/Seashaken_300.webp 300w"
                sizes="(max-width: 639px) 150px, (max-width: 999px) 225px, 300px"
                alt="light house in a video game">
                <p>Seashaken</p>
            </div>
            
            <div class="card" id="AboutMe">
                <img src="ref/Cards/AboutMe.webp" alt="About Me">
                <p>About Me</p>
            </div>

            <div class="card" id="RiverTool">
                <img src="ref/Cards/RiverTool_300.webp" 
                srcset="ref/Cards/RiverTool_150.webp 150w, 
                    ref/Cards/RiverTool_225.webp 225w,
                    ref/Cards/RiverTool_300.webp 300w"
                sizes="(max-width: 639px) 150px, (max-width: 999px) 225px, 300px"
                alt="digitally rendered river in a forest">
                <p>River Tool</p>
            </div>
            
            <div class="card" id="Ecospire">
                <img src="ref/Cards/Ecospire_300.webp" 
                srcset="ref/Cards/Ecospire_150.webp 150w, 
                    ref/Cards/Ecospire_225.webp 225w,
                    ref/Cards/Ecospire_300.webp 300w"
                sizes="(max-width: 639px) 150px, (max-width: 999px) 225px, 300px"
                alt="flying spherical roboter on neutral background">
                <p>Ecospire</p>
            </div>
            
            <div class="card" id="Nebio">
                <img src="ref/Cards/Nebio_300.webp"
                srcset="ref/Cards/Nebio_150.webp 150w, 
                    ref/Cards/Nebio_225.webp 225w,
                    ref/Cards/Nebio_300.webp 300w"
                sizes="(max-width: 639px) 150px, (max-width: 999px) 225px, 300px"
                alt="video game view of a network connected by green strings">
                <p>NEBIO</p>
            </div>

            <div class="card" id="MajorTom">
                <img src="ref/Cards/MajorTom_300.webp" 
                srcset="ref/Cards/MajorTom_150.webp 150w, 
                    ref/Cards/MajorTom_225.webp 225w,
                    ref/Cards/MajorTom_300.webp 300w"
                sizes="(max-width: 639px) 150px, (max-width: 999px) 225px, 300px"
                alt="girl in spacesuit looking to boy in spacesuit">
                <p>Little Major Tom</p>
            </div>

            <div class="card" id="HowToGod">
                <img src="ref/Cards/HowToGod_300.webp" 
                srcset="ref/Cards/HowToGod_150.webp 150w, 
                    ref/Cards/HowToGod_225.webp 225w,
                    ref/Cards/HowToGod_300.webp 300w"
                sizes="(max-width: 639px) 150px, (max-width: 999px) 225px, 300px"
                alt="creature with horns looking up to small human held by a big hand">
                <p>How to God</p>
            </div>

            <div class="card" id="boasff">
                <img src="ref/Cards/boasff_300.webp" 
                srcset="ref/Cards/boasff_150.webp 150w, 
                    ref/Cards/boasff_225.webp 225w,
                    ref/Cards/boasff_300.webp 300w"
                sizes="(max-width: 639px) 150px, (max-width: 999px) 225px, 300px"
                alt="stylized digitally drawn face with enormous large ears">
                <p>BoASFF</p>
            </div>
        </div>
    </div>

    <section class="project-content">

    </section>

    <footer>
        <a href="Impressum.html"><p><b>Impressum</b></p></a>
    </footer>

    <script src="CardOffset.js"></script>
    <script src="ScrollBehaviour.js"></script>
</body>
</html>
